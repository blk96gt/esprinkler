text_sensor:

#### Current state of controller ####
# Paused: Zone Name
# Standby
# Idle
# Starting...
# Stopping...
# Bypass
# Controller N/A 
# ##############
# TODO
#   - Clean up

  - platform: template
    id: ${cntrlr_id}_state
    name: "${cntrlr_name} Status"
    icon: "mdi:state-machine"
    update_interval: 2s
    #  Update lambda to have a single return at the end
    lambda: |-
      #include <esphome/components/sprinkler/sprinkler.h>
      #include <esphome/components/light/light_state.h>
      #define PAUSED_STR "Paused: "
      #define PAUSED_STR_LEN sizeof(PAUSED_STR) - 1

      auto paused_valve = id(${cntrlr_id}).paused_valve();

      if (paused_valve.has_value()) {
        auto paused_valve_name = id(${cntrlr_id}).valve_name(paused_valve.value());
        
        auto st = str_snprintf(
          PAUSED_STR "%s", PAUSED_STR_LEN + strlen(paused_valve_name),
          paused_valve_name);

        StringRef current = id(rgb_led).get_effect_name();

        if (current == "None") {
          auto call = id(rgb_led).turn_on();
          call.set_brightness(1.0);
          call.set_rgb(0.95, 0.02, 1.0);
          call.set_effect("Pulse");
          call.perform();
        }

        ESP_LOGI("main", "Controller paused...");
        return {st.c_str()};
      }
      // Is standby the same as bypass?
      if (id(${cntrlr_id}).standby()){
        StringRef current = id(rgb_led).get_effect_name();

        if (current == "None") {
          auto call = id(rgb_led).turn_on();
          call.set_rgb(1.0, 0.66, 0.0);
          call.set_effect("Strobe");
          call.perform();
        }

        ESP_LOGI("main", "Controller Standby...");
        return {"Standby"};
      }

      auto call = id(rgb_led).turn_on();

      switch(id(${cntrlr_id}).controller_state()) {
        case esphome::sprinkler::SprinklerState::IDLE:
          call.set_effect("None");
          call.set_brightness(1.0);
          call.set_rgb(0.0, 1.0, 0.0);
          call.perform();

          ESP_LOGI("main", "Controller Idle...");
          return {"Idle"};

        case esphome::sprinkler::SprinklerState::STARTING: 
          ESP_LOGI("main", "Controller Starting...");
          return {"Starting..."};

        case esphome::sprinkler::SprinklerState::ACTIVE: 
          call.set_effect("None");
          call.set_brightness(1.0);
          call.set_rgb(0.95, 0.02, 1.0);
          call.perform();

          ESP_LOGI("main", "Controller Active...");
          return {"Active"};

        case esphome::sprinkler::SprinklerState::STOPPING:
          ESP_LOGI("main", "Controller Stopping...");
          return {"Stopping..."};

        case esphome::sprinkler::SprinklerState::BYPASS: 
          call.set_rgb(1.0, 0.53, 0.0);
          call.set_effect("Pulse");
          call.perform();
          ESP_LOGI("main", "Controller Bypassed...");
          return {"Bypass"};
        
        default:
          call.set_rgb(1.0, 0.0, 0.0);
          call.set_effect("Pulse");
          call.perform();
          ESP_LOGI("main", "Controller N/A...");
      };
      return {"N/A"};

#### Run time remaining excluding current valve and including repeats & multiplier ####
  - platform: template
    id: ${cntrlr_id}_run_time_remaining
    name: "Run time remaining"
    icon: "mdi:timer-sand"
    update_interval: 1s
    lambda: |-
      if ( !id(${cntrlr_id}).paused_valve().has_value() ) {
        auto time_remaining = id(${cntrlr_id}).time_remaining_current_operation().value_or(0);
          // id(lawn_sprinkler_ctrlr).time_remaining_active_valve().value_or(0);

        if (time_remaining > 0) {
          auto remaining_hours = time_remaining / 3600;
          auto remaining_minutes = time_remaining / 60;
          auto remaining_seconds = time_remaining % 60;

          return
            to_string(remaining_hours) + "h "
            + to_string(remaining_minutes) + "m "
            + to_string(remaining_seconds) + "s";
        }

        return { "N/A" };
      }
      return {};

#### Current Active Zone ####
  - platform: template
    name: "Active Zone"
    lambda: |-
      if (id(${cntrlr_id}).active_valve().has_value()){
        return "Zone " + to_string(id(${cntrlr_id}).active_valve().value()+1);
      }

      return { "N/A" };
    update_interval: 1s

#### Amount of time left for zone ####
  - platform: template
    id: ${cntrlr_id}_zone_time_remaining
    name: "Zone Time Remaining"
    lambda: |-
      if ( !id(${cntrlr_id}).paused_valve().has_value() ) {

        if (id(${cntrlr_id}).time_remaining_active_valve().has_value()){
          auto time_remaining = id(${cntrlr_id}).time_remaining_active_valve().value_or(0);
          if (time_remaining > 0) {
            auto remaining_minutes = time_remaining / 60;
            auto remaining_seconds = time_remaining % 60;

            return
              // to_string(remaining_hours) + "h "
              to_string(remaining_minutes) + "m "
              + to_string(remaining_seconds) + "s";
          }
        }
        
        return { "N/A" };
      }
      return {};
      
    update_interval: 1s

#### Cycles/repeats remaining ####
  - platform: template
    id: ${cntrlr_id}_cycle_counts
    name: "Cycle Count"
    lambda: |-
      if ( id(${cntrlr_id}).active_valve().has_value() ){
        return to_string(id(${cntrlr_id}).repeat_count().value() + 1) + 
        "/" + to_string(id(${cntrlr_id}).repeat().value() + 1);
      }
      return "0/" + to_string(id(${cntrlr_id}).repeat().value() + 1);
    update_interval: 5s

#### Run request origin: USER, CYCLE, or QUEUE ####
  - platform: template
    id: ${cntrlr_id}_run_origin
    name: "Valve Run Type"
    update_interval: 5s
    lambda: |-
      if( id(${cntrlr_id}).active_valve_request_is_from().has_value() ) {
        switch( id(${cntrlr_id}).active_valve_request_is_from().value()) {
          case esphome::sprinkler::SprinklerValveRunRequestOrigin::USER:
            return {"Manual"};
          case esphome::sprinkler::SprinklerValveRunRequestOrigin::CYCLE:
            return {"Schedule"};
          case esphome::sprinkler::SprinklerValveRunRequestOrigin::QUEUE:
            return {"Queue"};
          default:
            return {"N/A"};
        }
      }
      return {"N/A"};





