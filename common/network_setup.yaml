api:
  encryption:
    key: !secret esprinkler_ha_key
  actions:
    # Ability to command the buzzer from Home Assistant
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'

ota:
  - platform: esphome
    password: !secret esprinkler_ota_pw

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
