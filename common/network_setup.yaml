api:
  encryption:
    key: !secret esprinkler_ha_key
  actions:
    # Ability to command the buzzer from Home Assistant
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'

ota:
  - platform: esphome
    #allow_partition_access: true
    password: !secret esprinkler_ota_pw
    # allow_partition_access: true

