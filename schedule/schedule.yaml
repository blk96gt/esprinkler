globals:
  # Schedule A
  - id: glob_sched_a
    type: bool[7]
    initial_value: '{false,false,false,false,false,false,false}'
    restore_value: true

  # Schedule B
  #   - TODO

  # Schedule C
  #   - TODO

datetime:
  # Schedule A Time
  - platform: template
    id: start_time
    type: time
    name: Start Time
    optimistic: yes
    initial_value: "02:00"
    restore_value: true


interval:
  - interval: 30s
    then:
      - lambda: |-
          if (id(glob_sched_a)[id(ha_time).now().day_of_week-1]){
            ESP_LOGD("main", "CORRECT DAY!!!!!!!!!!!!!!!!!!");
            if (id(lawn_sprinkler_ctrlr).paused_valve().has_value()){
              ESP_LOGD("main", "=============>>>>>>>>>Not running due to paused state!!!");
              return;
            }
            int current_hour = id(ha_time).now().hour;
            int current_minute = id(ha_time).now().minute;
            int desired_hour = id(start_time).hour;
            int desired_minute = id(start_time).minute;
            // Check if it is the desired hour and the automation should run
            if (current_hour == desired_hour && current_minute == desired_minute) {
              id(lawn_sprinkler_ctrlr).start_full_cycle();
              ESP_LOGD("main", "It's the desired hour, running action!");
            }
          }

switch:
  # Switch templates for days to water
  # TODO
  #   - Add schedule B&C
  - platform: template
    id: lawn_sunday_a_sw
    name: "Sunday"
    restore_mode: RESTORE_DEFAULT_OFF
    #entity_category: 
    lambda: |-
      if (id(glob_sched_a)[0]) {
        id(lawn_sunday_a_sw).publish_state(true);
        return true;
      } else {
        id(lawn_sunday_a_sw).publish_state(false);
        return false;
      }
    turn_on_action: 
      - lambda: 'id(glob_sched_a)[0] = true;'

    turn_off_action: 
      - lambda: 'id(glob_sched_a)[0] = false;'
        
