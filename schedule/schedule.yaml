globals:
  # Schedule A
  - id: glob_sched_a
    type: bool[7]
    initial_value: '{false,false,false,false,false,false,false}'
    restore_value: true

  # Schedule B
  #   - TODO

  # Schedule C
  #   - TODO
script:
  - id: run_schedule_a
    # parameters:
    #   delay_ms: int
    then:
      # Set zone run durations
      - logger.log: 
          format: ">>>>>> Starting Schedule A"
          level: INFO
      - lambda: id(a_schedule_sw).publish_state(true);
      - number.set:
          id: z1_run_duration_number
          value: !lambda |-
            return id(sched_a_z1_run_time).state;
      - number.set:
          id: z2_run_duration_number
          value: !lambda |-
            return id(sched_a_z2_run_time).state;
      - number.set:
          id: z3_run_duration_number
          value: !lambda |-
            return id(sched_a_z3_run_time).state;
      - switch.turn_on: sprinkler_cntrlr_main_switch_id
      # - logger.log: "=========>>>>>> Finished script"
      
      # # The param delay_ms is accessible using a lambda
      # - light.turn_off: status_light

datetime:
  # Schedule A Time
  - platform: template
    id: start_time
    type: time
    name: Start Time
    optimistic: yes
    initial_value: "02:00"
    restore_value: true


interval:
  - interval: 30s
    then:
      - lambda: |-
          // Check if Schedule A is running today
          if (id(glob_sched_a)[id(ha_time).now().day_of_week-1]){
            if (id(sprinkler_cntrlr).paused_valve().has_value()){
              ESP_LOGI("main", ">>>>>>>>>Cycle skipped due to system PAUSED");
              return;
            }
            
            int current_hour = id(ha_time).now().hour;
            int current_minute = id(ha_time).now().minute;
            int desired_hour = id(start_time).hour;
            int desired_minute = id(start_time).minute;
            // Check if it is the desired hour and the automation should run
            if (current_hour == desired_hour && current_minute == desired_minute) {
              id(sprinkler_cntrlr).start_full_cycle();
              ESP_LOGI("main", "Cycle started...");
            }
          }

switch:
  # Switch templates for days to water
  # TODO
  #   - Add schedule B&C
  - platform: template
    id: a_schedule_sw
    name: "Schedule A"
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - script.execute: run_schedule_a
    turn_off_action: 
      - lambda: id(a_schedule_sw).publish_state(false);

  - platform: template
    id: lawn_sunday_a_sw
    name: "Sunday"
    restore_mode: RESTORE_DEFAULT_OFF
    #entity_category: 
    lambda: |-
      if (id(glob_sched_a)[0]) {
        id(lawn_sunday_a_sw).publish_state(true);
        return true;
      } else {
        id(lawn_sunday_a_sw).publish_state(false);
        return false;
      }
    turn_on_action: 
      - lambda: 'id(glob_sched_a)[0] = true;'

    turn_off_action: 
      - lambda: 'id(glob_sched_a)[0] = false;'
        
