switch:
##### Zone Enabled #####
  - platform: template
    id: ${sched_id}_z1_enable_sw
    name: "${sched_id} ${z1_name} Enable"
    restore_mode: RESTORE_DEFAULT_OFF
    #entity_category: 
    # lambda: |-
    #   if (id(glob_sched_a)[0]) {
    #     id(lawn_sunday_a_sw).publish_state(true);
    #     return true;
    #   } else {
    #     id(lawn_sunday_a_sw).publish_state(false);
    #     return false;
    #   }
    turn_on_action: 
      - lambda: 'id(${sched_id}_z1_enable_sw).publish_state(true);'

    turn_off_action: 
      - lambda: 'id(${sched_id}_z1_enable_sw).publish_state(false);'
  
