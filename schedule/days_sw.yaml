switch:
##### Schedule A Switches #####
  - platform: template
    id: lawn_sunday_a_sw
    name: "Sunday"
    restore_mode: RESTORE_DEFAULT_OFF
    #entity_category: 
    lambda: |-
      id(lawn_sunday_a_sw).control(id(glob_sched_a)[0]);
      return id(glob_sched_a)[0];
# if (id(glob_sched_a)[0]) {
#   id(lawn_sunday_a_sw).publish_state(true);
#   return true;
# } else {
#   id(lawn_sunday_a_sw).publish_state(false);
#   return false;
# }
    turn_on_action: 
      - lambda: 'id(glob_sched_a)[0] = true;'

    turn_off_action: 
      - lambda: 'id(glob_sched_a)[0] = false;'
        
  - platform: template
    id: lawn_monday_a_sw
    name: "Monday"
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      if (id(glob_sched_a)[1]) {
        id(lawn_monday_a_sw).publish_state(true);
        return true;
      } else {
        id(lawn_monday_a_sw).publish_state(false);
        return false;
      }
    turn_on_action: 
      - lambda: 'id(glob_sched_a)[1] = true;'

    turn_off_action: 
