switch:
##### Schedule A Switches #####
  - platform: template
    id: lawn_sunday_${sched_id}_sw
    name: "${sched_name} Sunday"
    restore_mode: RESTORE_DEFAULT_OFF
    #entity_category: 
    lambda: |-
      id(lawn_sunday_${sched_id}_sw).control(id(glob_sched_${sched_id})[0]);
      return id(glob_sched_${sched_id})[0];
# if (id(glob_sched_a)[0]) {
#   id(lawn_sunday_a_sw).publish_state(true);
#   return true;
# } else {
#   id(lawn_sunday_a_sw).publish_state(false);
#   return false;
# }
    turn_on_action: 
      - lambda: 'id(glob_sched_${sched_id})[0] = true;'

    turn_off_action: 
      - lambda: 'id(glob_sched_${sched_id})[0] = false;'
        
