button:
  # - platform: template
  #   name: Pause
  #   id: sprinkler_pause_button
  #   #icon: "mdi:emoticon-outline"
  #   on_press:
  #     - sprinkler.pause: lawn_sprinkler_ctrlr
  
  # - platform: template
  #   name: Resume
  #   id: sprinkler_resume_button
  #   #icon: "mdi:emoticon-outline"
  #   on_press:
  #     - sprinkler.resume: lawn_sprinkler_ctrlr

  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: reset
    entity_category: config

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config

binary_sensor:
  - platform: status
    name: "Status"

  - platform: gpio
    name: "Boot Button"
    pin:
      number: 0
      ignore_strapping_warning: true
      mode:
        input: true
      inverted: true
    disabled_by_default: true
    on_press:
      then:
        - button.press: restart_button

