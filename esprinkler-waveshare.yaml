esphome:
  name: waveshare-controller
  comment: "WaveShare ESP32-S3-POE-ETH-8DI-8RO device"
  friendly_name: "Waveshare Controller"
  name_add_mac_suffix: false
  on_boot:
    then:
      - pcf85063.read_time

# esp32:
#   board: esp32dev
#   framework:
#     type: esp-idf
esp32:
  board: esp32s3box #esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

debug:
  update_interval: 5s

# Enable Home Assistant API
api:
  encryption:
    key: "+nBiBzgMX06SPA+EXhAPGk8D1yxVEtdfpJHdtqiEwEs="
  actions:
    # Ability to command the buzzer from Home Assistant
    - action: rtttl_play
      variables:
        song_str: string
      then:
        - rtttl.play:
            rtttl: !lambda 'return song_str;'
ota:
  - platform: esphome
    password: "0328b730de977e1aef3aa72c87d1b7d8"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Sprinkler-Test Fallback Hotspot"
    password: "GvUgqwouIorW"

