esphome:
  name: sprinkler-test
  friendly_name: sprinkler_test

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

debug:
  update_interval: 5s

# Enable Home Assistant API
api:
  encryption:
    key: "+nBiBzgMX06SPA+EXhAPGk8D1yxVEtdfpJHdtqiEwEs="

ota:
  - platform: esphome
    password: "0328b730de977e1aef3aa72c87d1b7d8"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Sprinkler-Test Fallback Hotspot"
    password: "GvUgqwouIorW"

web_server:
  version: 3

substitutions:
  run_duration_uom: s
  run_duration_initial_value: '5'
  rain_sensor_id: rain_sensor
  rain_sensor_inverted: 'true'
  peripherals_power_off_relay_id: relay_7
  valve_overlap: 1s
  pump_start_pump_delay: 1s
  pump_stop_valve_delay: 1s
  rtc_id: rtc_time
  timezone: CST
  temperature_sensor_id: temperature
  test_var: 3
  running_day: false
  day_update_interval: 3min
  hourly_update_interval: 60min
  default_update_interval: 30s

packages:   # as a list
  # Time, IP, MAC addr, Wifi info, Temperature, etc
  - !include sensors/generic_sensors.yaml
  - !include controller/controller.yaml
  - !include controller/controller_status.yaml
  - !include schedule/schedule.yaml
  ##### Uncomment below if compiling from esphome builder #####
  # - !include esprinkler/sensors/generic_sensors.yaml
  # - !include esprinkler/controller/controller.yaml
  # - !include esprinkler/controller/controller_status.yaml
  # - !include esprinkler/schedule/schedule.yaml

switch:
  - platform: gpio
    id: lawn_valve_sw0
    pin: GPIO17
  - platform: gpio
    id: lawn_valve_sw1
    pin: GPIO18
  - platform: gpio
    id: lawn_valve_sw2
    pin: GPIO19
  - platform: gpio
    id: lawn_valve_sw3
    pin: GPIO20
  - platform: gpio
    id: lawn_valve_sw4
    pin: GPIO21
  - platform: gpio
    id: lawn_valve_sw5
    pin: GPIO22
  - platform: gpio
    id: lawn_valve_sw6
    pin: GPIO23
  - platform: gpio
    id: lawn_valve_sw7
    pin: GPIO25

button:
  - platform: template
    name: Pause
    id: sprinkler_pause_button
    #icon: "mdi:emoticon-outline"
    on_press:
      - sprinkler.pause: lawn_sprinkler_ctrlr
  
  - platform: template
    name: Resume
    id: sprinkler_resume_button
    #icon: "mdi:emoticon-outline"
    on_press:
      - sprinkler.resume: lawn_sprinkler_ctrlr

