    repeat_number: "Lawn Sprinkler Repeat"
    # VERIFY THIS IS SUFFICENT
    valve_open_delay: 5s
    # standby_switch: 
    valves:
      # Add zones
      # TODO
      #   - Add remaining zones
      - valve_switch: "Zone 1"
        enable_switch: "Enable Zone 1"
        run_duration_number: 
